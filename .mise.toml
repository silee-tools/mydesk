[tools]
go = "latest"

[tasks.build]
run = "go build ./..."
description = "Build all packages"

[tasks.test]
run = "go test ./..."
description = "Run all tests"

[tasks.lint]
run = "golangci-lint run"
description = "Run linter"

[tasks.fmt]
run = "gofmt -w ."
description = "Format code"

[tasks.fmt-check]
run = "test -z $(gofmt -l .)"
description = "Check formatting (CI)"
